<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Factory Generator</title>
  <style>
    :root {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --primary-color: #bb86fc;
      --secondary-color: #03dac6;
      --text-color: #e0e0e0;
      --input-bg: #2c2c2c;
      --border-color: #333;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
      color: var(--primary-color);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    /* Sticky Card & Buttons */
    .sticky-card {
      position: sticky;
      top: 16px;
      z-index: 100;
      padding-bottom: 50px; 
    }

    .header-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn-action {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: var(--secondary-color);
      color: #000;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-action:active {
      opacity: 0.8;
    }

    #collapse-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      background-color: var(--input-bg);
      color: var(--primary-color);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.3s ease;
    }

    #collapse-btn.rotated {
      transform: rotate(180deg);
    }

    #collapsible-section {
      display: block;
    }

    #collapsible-section.hidden {
      display: none;
    }

    /* Sprite Preview */
    .preview-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 120px;
      margin-bottom: 16px;
      background: var(--input-bg);
      border-radius: 12px;
      overflow: hidden;
    }

    .preview-container img {
      max-height: 100%;
      image-rendering: pixelated;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 0.9rem;
    }

    input[type="text"], input[type="number"], select, input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--input-bg);
      color: var(--text-color);
      font-size: 1rem;
    }

    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    /* Autocomplete Styling */
    .autocomplete-wrapper {
      position: relative;
      display: block;
    }

    .autocomplete-items {
      position: absolute;
      border: 1px solid var(--border-color);
      border-top: none;
      z-index: 99;
      top: 100%;
      left: 0;
      right: 0;
      background-color: var(--input-bg);
      max-height: 200px;
      overflow-y: auto;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }

    .autocomplete-items div {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
    }

    .autocomplete-items div:hover {
      background-color: var(--primary-color);
      color: #000;
    }

    .autocomplete-active {
      background-color: var(--primary-color) !important;
      color: #000;
    }

    /* Checkboxes & Sliders */
    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 8px 0;
    }

    input[type="checkbox"] {
      width: 24px;
      height: 24px;
      accent-color: var(--primary-color);
    }

    input[type="range"] {
      width: 100%;
      margin-top: 8px;
      accent-color: var(--primary-color);
    }

    /* Grid for IVs */
    .iv-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      display: none; 
    }

    /* Output */
    textarea {
      width: 100%;
      box-sizing: border-box;
      height: 220px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 0.9rem;
      resize: vertical;
    }

    button.primary-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      background-color: var(--primary-color);
      color: #000;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 16px;
    }

    button.primary-btn:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Pokémon Factory</h1>

  <div class="header-buttons">
    <button class="btn-action" id="randomize-btn">🎲 Randomize</button>
  </div>

  <div class="card sticky-card" id="main-card">
    <div class="preview-container">
      <img id="sprite-preview" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="Sprite Preview">
    </div>

    <div class="form-group" style="margin-bottom: 0;">
      <label for="species">Species</label>
      <div class="autocomplete-wrapper">
        <input type="text" id="species" value="Bulbasaur" placeholder="e.g. Eevee or Bulbasaur">
      </div>
    </div>

    <div id="collapsible-section">
      <div class="form-group" style="margin-top: 16px;">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" placeholder="Leave blank for none">
      </div>

      <div class="form-group">
        <label for="level">Level</label>
        <input type="number" id="level" value="5" min="1" max="100">
      </div>

      <div class="form-group">
        <label for="item">Held Item</label>
        <div class="autocomplete-wrapper">
          <input type="text" id="item" placeholder="e.g. Leftovers">
        </div>
      </div>

      <div class="form-group">
        <label for="poke_ball">Poké Ball</label>
        <div class="autocomplete-wrapper">
          <input type="text" id="poke_ball" value="Poke Ball">
        </div>
      </div>
    </div>
    
    <button id="collapse-btn" title="Collapse/Expand">▲</button>
  </div>

  <div class="card">
    <h2>Appearance & Typing</h2>

    <div class="toggle-group">
      <label for="shiny">Shiny</label>
      <input type="checkbox" id="shiny">
    </div>

    <div class="form-group">
      <label for="types">Types Override (comma separated)</label>
      <div class="autocomplete-wrapper">
        <input type="text" id="types" placeholder="e.g. Fire, Fighting">
      </div>
    </div>

    <div class="form-group">
      <label for="hue_change">Hue Change (0-360): <span id="hue-val">0</span></label>
      <input type="range" id="hue_change" min="0" max="360" value="0">
    </div>

    <div class="form-group">
      <label for="sprite_override">Sprite Override (Path)</label>
      <input type="text" id="sprite_override" placeholder="Graphics/Battlers/custom">
    </div>
  </div>

  <div class="card">
    <h2>Stats</h2>
    <div class="form-group">
      <label for="nature">Nature</label>
      <select id="nature">
        <option value="">(None)</option>
        <option value=":HARDY">Hardy</option>
        <option value=":LONELY">Lonely</option>
        <option value=":BRAVE">Brave</option>
        <option value=":ADAMANT">Adamant</option>
        <option value=":NAUGHTY">Naughty</option>
        <option value=":BOLD">Bold</option>
        <option value=":DOCILE">Docile</option>
        <option value=":RELAXED">Relaxed</option>
        <option value=":IMPISH">Impish</option>
        <option value=":LAX">Lax</option>
        <option value=":TIMID">Timid</option>
        <option value=":HASTY">Hasty</option>
        <option value=":SERIOUS">Serious</option>
        <option value=":JOLLY">Jolly</option>
        <option value=":NAIVE">Naive</option>
        <option value=":MODEST">Modest</option>
        <option value=":MILD">Mild</option>
        <option value=":QUIET">Quiet</option>
        <option value=":BASHFUL">Bashful</option>
        <option value=":RASH">Rash</option>
        <option value=":CALM">Calm</option>
        <option value=":GENTLE">Gentle</option>
        <option value=":SASSY">Sassy</option>
        <option value=":CAREFUL">Careful</option>
        <option value=":QUIRKY">Quirky</option>
      </select>
    </div>

    <div class="form-group">
      <label for="ivs_type">IVs</label>
      <select id="ivs_type">
        <option value=":random">Random</option>
        <option value=":perfect">Perfect</option>
        <option value="custom">Custom</option>
      </select>
    </div>

    <div class="iv-grid" id="iv-grid">
      <div class="form-group"><label>HP</label><input type="number" id="iv_hp" min="0" max="31" value="31"></div>
      <div class="form-group"><label>Atk</label><input type="number" id="iv_atk" min="0" max="31" value="31"></div>
      <div class="form-group"><label>Def</label><input type="number" id="iv_def" min="0" max="31" value="31"></div>
      <div class="form-group"><label>SpA</label><input type="number" id="iv_spa" min="0" max="31" value="31"></div>
      <div class="form-group"><label>SpD</label><input type="number" id="iv_spd" min="0" max="31" value="31"></div>
      <div class="form-group"><label>Spe</label><input type="number" id="iv_spe" min="0" max="31" value="31"></div>
    </div>
  </div>

  <div class="card">
    <h2>Moves</h2>
    <div class="form-group">
      <div class="autocomplete-wrapper"><input type="text" id="move1" placeholder="Move 1"></div>
    </div>
    <div class="form-group">
      <div class="autocomplete-wrapper"><input type="text" id="move2" placeholder="Move 2"></div>
    </div>
    <div class="form-group">
      <div class="autocomplete-wrapper"><input type="text" id="move3" placeholder="Move 3"></div>
    </div>
    <div class="form-group">
      <div class="autocomplete-wrapper"><input type="text" id="move4" placeholder="Move 4"></div>
    </div>
  </div>

  <div class="card">
    <h2>Generated Ruby Hash</h2>
    <textarea id="output" readonly></textarea>
    <button class="primary-btn" id="copy-btn">Copy to Clipboard</button>
  </div>

  <!-- Data Management Section -->
  <div class="card">
    <h2>Data Management</h2>
    <p style="font-size: 0.85rem; color: #aaa; text-align: center; margin-top:0;">Upload .txt or .md files to expand autocomplete pools.</p>
    
    <div class="form-group">
      <label for="import_target">Data Type to Update</label>
      <select id="import_target">
        <option value="species">Species Pool</option>
        <option value="moves">Moves Pool</option>
        <option value="items">Items Pool</option>
        <option value="types">Types Pool</option>
        <option value="nicknames">Nicknames Pool</option>
      </select>
    </div>

    <div class="form-group">
      <input type="file" id="file_upload" accept=".txt,.md,.csv,.pbs">
    </div>
    <button class="btn-action" id="import-btn" style="width: 100%;">Import File Data</button>
    <p id="import-status" style="color: var(--secondary-color); text-align: center; font-size: 0.9rem;"></p>
  </div>
</div>

<script>
  // --- DATA ARRAYS ---
  let typesData = ["Normal", "Fire", "Water", "Grass", "Electric", "Ice", "Fighting", "Poison", "Ground", "Flying", "Psychic", "Bug", "Rock", "Ghost", "Dark", "Dragon", "Steel", "Fairy"];
  let itemsData = ["Leftovers", "Life Orb", "Choice Band", "Choice Specs", "Choice Scarf", "Focus Sash", "Black Sludge", "Assault Vest", "Heavy-Duty Boots", "Rocky Helmet", "Eviolite", "Sitrus Berry", "Lum Berry", "Master Ball", "Ultra Ball", "Great Ball", "Poke Ball", "Premier Ball", "Quick Ball", "Dusk Ball"];
  let movesData = ["Tackle", "Thunderbolt", "Ice Beam", "Flamethrower", "Earthquake", "Protect", "Substitute", "Swords Dance", "Dragon Dance", "Calm Mind", "Toxic", "Sludge Bomb", "Shadow Ball", "Dark Pulse", "Flash Cannon", "Aura Sphere", "Close Combat", "Brave Bird", "Roost", "Recover", "Volt Switch", "U-turn", "Scald", "Hydro Pump", "Surf", "Giga Drain", "Leaf Storm", "Moonblast", "Play Rough", "Stone Edge", "Rock Slide", "Stealth Rock", "Spikes", "Defog", "Rapid Spin", "Sucker Punch", "Vital Throw", "Bulk Up", "Detect"];
  let speciesData = ["Bulbasaur", "Ivysaur", "Venusaur", "Charmander", "Charmeleon", "Charizard", "Squirtle", "Wartortle", "Blastoise", "Caterpie", "Metapod", "Butterfree", "Weedle", "Kakuna", "Beedrill", "Pidgey", "Pidgeotto", "Pidgeot", "Rattata", "Raticate", "Spearow", "Fearow", "Ekans", "Arbok", "Pikachu", "Raichu", "Sandshrew", "Sandslash", "NidoranF", "Nidorina", "Nidoqueen", "NidoranM", "Nidorino", "Nidoking", "Clefairy", "Clefable", "Vulpix", "Ninetales", "Jigglypuff", "Wigglytuff", "Zubat", "Golbat", "Oddish", "Gloom", "Vileplume", "Paras", "Parasect", "Venonat", "Venomoth", "Diglett", "Dugtrio", "Meowth", "Persian", "Psyduck", "Golduck", "Mankey", "Primeape", "Growlithe", "Arcanine", "Poliwag", "Poliwhirl", "Poliwrath", "Abra", "Kadabra", "Alakazam", "Machop", "Machoke", "Machamp", "Bellsprout", "Weepinbell", "Victreebel", "Tentacool", "Tentacruel", "Geodude", "Graveler", "Golem", "Ponyta", "Rapidash", "Slowpoke", "Slowbro", "Magnemite", "Magneton", "Farfetch'd", "Doduo", "Dodrio", "Seel", "Dewgong", "Grimer", "Muk", "Shellder", "Cloyster", "Gastly", "Haunter", "Gengar", "Onix", "Drowzee", "Hypno", "Krabby", "Kingler", "Voltorb", "Electrode", "Exeggcute", "Exeggutor", "Cubone", "Marowak", "Hitmonlee", "Hitmonchan", "Lickitung", "Koffing", "Weezing", "Rhyhorn", "Rhydon", "Chansey", "Tangela", "Kangaskhan", "Horsea", "Seadra", "Goldeen", "Seaking", "Staryu", "Starmie", "Mr. Mime", "Scyther", "Jynx", "Electabuzz", "Magmar", "Pinsir", "Tauros", "Magikarp", "Gyarados", "Lapras", "Ditto", "Eevee", "Vaporeon", "Jolteon", "Flareon", "Porygon", "Omanyte", "Omastar", "Kabuto", "Kabutops", "Aerodactyl", "Snorlax", "Articuno", "Zapdos", "Moltres", "Dratini", "Dragonair", "Dragonite", "Mewtwo", "Mew"];
  
  // Nicknames Array (Structured)
  let nicknamesData = [
    { name: "Spike", gender: "male", theme: "edgy", types: ["Dark", "Poison", "Steel", "Rock"] },
    { name: "Shadow", gender: "unisex", theme: "edgy", types: ["Ghost", "Dark"] },
    { name: "Grim", gender: "male", theme: "edgy", types: ["Ghost", "Dark"] },
    { name: "Cupcake", gender: "female", theme: "food", types: ["Fairy", "Normal"] },
    { name: "Muffin", gender: "unisex", theme: "food", types: ["Fairy", "Normal"] },
    { name: "Waffles", gender: "unisex", theme: "food", types: ["Normal", "Fighting"] },
    { name: "Princess", gender: "female", theme: "cute", types: ["Fairy", "Dragon", "Ice"] },
    { name: "Bubbles", gender: "unisex", theme: "cute", types: ["Water"] },
    { name: "Tank", gender: "male", theme: "tough", types: ["Steel", "Rock", "Ground"] },
    { name: "Brutus", gender: "male", theme: "tough", types: ["Fighting", "Dark", "Rock"] },
    { name: "Athena", gender: "female", theme: "tough", types: ["Psychic", "Fighting", "Steel"] },
    { name: "Zeus", gender: "male", theme: "mythology", types: ["Electric", "Flying"] },
    { name: "Poopin", gender: "unisex", theme: "funny", types: ["Poison", "Ground"] },
    { name: "Hitta", gender: "unisex", theme: "tough", types: ["Fighting", "Dark"] },
    { name: "Fluffy", gender: "unisex", theme: "cute", types: ["Normal", "Fairy", "Ice", "Flying"] },
    { name: "Sparky", gender: "unisex", theme: "cute", types: ["Electric", "Fire"] },
    { name: "Pebbles", gender: "female", theme: "cute", types: ["Rock", "Ground"] },
    { name: "Blaze", gender: "unisex", theme: "edgy", types: ["Fire"] },
    { name: "Leafy", gender: "unisex", theme: "cute", types: ["Grass"] }
  ];

  // --- AUTOCOMPLETE LOGIC ---
  function autocomplete(inp, arr, isCommaSeparated = false) {
    let currentFocus;
    // Remove old listeners by cloning
    let newInp = inp.cloneNode(true);
    inp.parentNode.replaceChild(newInp, inp);
    inp = newInp;

    inp.addEventListener("input", function(e) {
      let a, b, i, val = this.value;
      closeAllLists();
      
      let searchVal = val.replace(/^:/, ''); 
      if (isCommaSeparated) {
        let parts = searchVal.split(',');
        searchVal = parts[parts.length - 1].trim();
      }

      if (!searchVal) { return false; }
      currentFocus = -1;

      a = document.createElement("DIV");
      a.setAttribute("id", this.id + "autocomplete-list");
      a.setAttribute("class", "autocomplete-items");
      this.parentNode.appendChild(a);

      let count = 0;
      for (i = 0; i < arr.length; i++) {
        if (arr[i].substr(0, searchVal.length).toUpperCase() == searchVal.toUpperCase()) {
          b = document.createElement("DIV");
          b.innerHTML = "<strong>" + arr[i].substr(0, searchVal.length) + "</strong>";
          b.innerHTML += arr[i].substr(searchVal.length);
          b.innerHTML += "<input type='hidden' value='" + arr[i] + "'>";
          
          b.addEventListener("click", function(e) {
            let selectedVal = this.getElementsByTagName("input")[0].value;
            
            if (isCommaSeparated) {
              let parts = inp.value.split(',');
              parts.pop();
              parts.push(" " + selectedVal);
              inp.value = parts.join(',').trim() + ", ";
            } else {
              inp.value = selectedVal;
            }
            
            closeAllLists();
            updateAll();
          });
          a.appendChild(b);
          count++;
          if (count >= 15) break; 
        }
      }
    });

    inp.addEventListener("keydown", function(e) {
      let x = document.getElementById(this.id + "autocomplete-list");
      if (x) x = x.getElementsByTagName("div");
      if (e.keyCode == 40) { 
        currentFocus++;
        addActive(x);
      } else if (e.keyCode == 38) { 
        currentFocus--;
        addActive(x);
      } else if (e.keyCode == 13) { 
        e.preventDefault();
        if (currentFocus > -1) {
          if (x) x[currentFocus].click();
        } else if (x && x.length === 1) {
          x[0].click(); 
        }
      }
    });

    function addActive(x) {
      if (!x) return false;
      removeActive(x);
      if (currentFocus >= x.length) currentFocus = 0;
      if (currentFocus < 0) currentFocus = (x.length - 1);
      x[currentFocus].classList.add("autocomplete-active");
      x[currentFocus].scrollIntoView({ block: "nearest" });
    }
    function removeActive(x) {
      for (let i = 0; i < x.length; i++) { x[i].classList.remove("autocomplete-active"); }
    }
    function closeAllLists(elmnt) {
      let x = document.getElementsByClassName("autocomplete-items");
      for (let i = 0; i < x.length; i++) {
        if (elmnt != x[i] && elmnt != inp) {
          x[i].parentNode.removeChild(x[i]);
        }
      }
    }
    document.addEventListener("click", function (e) { closeAllLists(e.target); });
    
    // Add main event listener back for live updates
    inp.addEventListener('input', updateAll);
  }

  // --- ELEMENTS & SETUP ---
  const els = {
    species: document.getElementById('species'),
    nickname: document.getElementById('nickname'),
    level: document.getElementById('level'),
    item: document.getElementById('item'),
    poke_ball: document.getElementById('poke_ball'),
    shiny: document.getElementById('shiny'),
    types: document.getElementById('types'),
    hue_change: document.getElementById('hue_change'),
    hue_val: document.getElementById('hue-val'),
    sprite_override: document.getElementById('sprite_override'),
    nature: document.getElementById('nature'),
    ivs_type: document.getElementById('ivs_type'),
    iv_grid: document.getElementById('iv-grid'),
    iv_hp: document.getElementById('iv_hp'),
    iv_atk: document.getElementById('iv_atk'),
    iv_def: document.getElementById('iv_def'),
    iv_spa: document.getElementById('iv_spa'),
    iv_spd: document.getElementById('iv_spd'),
    iv_spe: document.getElementById('iv_spe'),
    move1: document.getElementById('move1'),
    move2: document.getElementById('move2'),
    move3: document.getElementById('move3'),
    move4: document.getElementById('move4'),
    output: document.getElementById('output'),
    preview: document.getElementById('sprite-preview')
  };

  function initAutocompletes() {
    autocomplete(document.getElementById('species'), speciesData);
    autocomplete(document.getElementById('item'), itemsData);
    autocomplete(document.getElementById('poke_ball'), itemsData);
    autocomplete(document.getElementById('types'), typesData, true);
    autocomplete(document.getElementById('move1'), movesData);
    autocomplete(document.getElementById('move2'), movesData);
    autocomplete(document.getElementById('move3'), movesData);
    autocomplete(document.getElementById('move4'), movesData);
  }
  initAutocompletes();

  // State mapping for pokeapi species names
  const speciesMap = {
    'mr.mime': 'mr-mime', 'mime jr.': 'mime-jr', 'mr.rime': 'mr-rime', 'type: null': 'type-null',
    'tapu koko': 'tapu-koko', 'tapu lele': 'tapu-lele', 'tapu bulu': 'tapu-bulu', 'tapu fini': 'tapu-fini',
    'farfetch\'d': 'farfetchd', 'sirfetch\'d': 'sirfetchd', 'flabébé': 'flabebe',
    'nidoranf': 'nidoran-f', 'nidoranm': 'nidoran-m'
  };

  // UI Toggles
  const collapseBtn = document.getElementById('collapse-btn');
  const collapsibleSection = document.getElementById('collapsible-section');
  collapseBtn.addEventListener('click', () => {
    collapsibleSection.classList.toggle('hidden');
    collapseBtn.classList.toggle('rotated');
  });

  const allInputs = document.querySelectorAll('input:not([type="file"]), select');
  allInputs.forEach(input => input.addEventListener('input', updateAll));

  els.ivs_type.addEventListener('change', () => {
    els.iv_grid.style.display = els.ivs_type.value === 'custom' ? 'grid' : 'none';
  });

  document.getElementById('copy-btn').addEventListener('click', () => {
    els.output.select();
    document.execCommand('copy');
    const btn = document.getElementById('copy-btn');
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy to Clipboard", 2000);
  });

  // --- RANDOMIZER LOGIC ---
  function getRandomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  document.getElementById('randomize-btn').addEventListener('click', () => {
    // Basic fields
    document.getElementById('species').value = getRandomItem(speciesData);
    els.level.value = Math.floor(Math.random() * 95) + 5; // Level 5-100
    
    // Appearance & Types
    els.shiny.checked = Math.random() > 0.9; // 10% chance shiny
    els.hue_change.value = Math.random() > 0.5 ? Math.floor(Math.random() * 360) : 0;
    els.sprite_override.value = "";

    // Random Types (40% chance to assign 1-2 custom types)
    let selectedTypes = [];
    if (Math.random() > 0.6) {
      let numTypes = Math.random() > 0.5 ? 1 : 2;
      let type1 = getRandomItem(typesData);
      selectedTypes.push(type1);
      if (numTypes === 2) {
        let availableTypes = typesData.filter(t => t !== type1);
        if(availableTypes.length > 0) selectedTypes.push(getRandomItem(availableTypes));
      }
      document.getElementById('types').value = selectedTypes.join(', ');
    } else {
      document.getElementById('types').value = "";
    }

    // Pick random nickname (Filter by type if custom types exist)
    let validNicks = nicknamesData;
    if (selectedTypes.length > 0) {
      let matchedNicks = nicknamesData.filter(n => n.types && n.types.some(t => selectedTypes.includes(t)));
      if (matchedNicks.length > 0) validNicks = matchedNicks;
    }
    let randNick = getRandomItem(validNicks);
    els.nickname.value = randNick ? randNick.name : "";

    // BUG FIX: Must use getElementById because autocomplete replaces the node
    // Increased to 60% chance for an item
    document.getElementById('item').value = Math.random() > 0.4 ? getRandomItem(itemsData) : "";
    
    // Poke Ball
    const commonBalls = ["Poke Ball", "Great Ball", "Ultra Ball", "Premier Ball", "Dusk Ball"];
    document.getElementById('poke_ball').value = getRandomItem(commonBalls);

    // Nature
    const natureOptions = Array.from(els.nature.options).map(o => o.value).filter(v => v !== "");
    els.nature.value = getRandomItem(natureOptions);

    // IVs
    els.ivs_type.value = Math.random() > 0.5 ? ":random" : ":perfect";
    els.iv_grid.style.display = 'none';

    // Moves (1 to 4 random moves)
    let moveCount = Math.floor(Math.random() * 4) + 1;
    document.getElementById('move1').value = moveCount >= 1 ? getRandomItem(movesData) : "";
    document.getElementById('move2').value = moveCount >= 2 ? getRandomItem(movesData) : "";
    document.getElementById('move3').value = moveCount >= 3 ? getRandomItem(movesData) : "";
    document.getElementById('move4').value = moveCount >= 4 ? getRandomItem(movesData) : "";

    // Trigger update
    updateAll();
  });

  // --- FILE UPLOAD LOGIC ---
  document.getElementById('import-btn').addEventListener('click', () => {
    const fileInput = document.getElementById('file_upload');
    const target = document.getElementById('import_target').value;
    const statusText = document.getElementById('import-status');
    
    if (!fileInput.files.length) {
      statusText.textContent = "Please select a file first.";
      statusText.style.color = "red";
      return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
      const text = e.target.result;
      let parsedItems = [];
      
      // Check if this looks like an Essentials v21 PBS file (INI format)
      const isPBS = text.includes("Name =") || text.includes("Name=");

      if (isPBS && target !== 'nicknames') {
        // Smart PBS Parser
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
          let trimmed = line.trim();
          // Look strictly for the 'Name' key to avoid grabbing 'NamePlural' or 'Pokedex'
          if (trimmed.startsWith("Name")) {
            let parts = trimmed.split("=");
            if (parts.length >= 2 && parts[0].trim() === "Name") {
              let nameVal = parts.slice(1).join("=").trim();
              if (nameVal) parsedItems.push(nameVal);
            }
          }
        }
      } else {
        // Fallback for simple comma or newline separated lists (like nicknames.md)
        parsedItems = text.split(/[\n,]+/).map(i => i.replace(/['"\r]/g, '').trim()).filter(i => i !== "");
      }
      
      if(parsedItems.length === 0) {
        statusText.textContent = "No readable data found in file.";
        statusText.style.color = "red";
        return;
      }

      if (target === 'species') {
        speciesData = [...new Set([...speciesData, ...parsedItems])];
      } else if (target === 'moves') {
        movesData = [...new Set([...movesData, ...parsedItems])];
      } else if (target === 'items') {
        itemsData = [...new Set([...itemsData, ...parsedItems])];
      } else if (target === 'types') {
        typesData = [...new Set([...typesData, ...parsedItems])];
      } else if (target === 'nicknames') {
        // Map raw strings to the structured object for nicknames
        // Allow optional type filtering by uploading CSV format: "Name, Type1, Type2"
        let lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
        let newNicks = lines.map(line => {
          let parts = line.split(',').map(p => p.replace(/['"\r]/g, '').trim()).filter(p => p !== "");
          if (parts.length === 1) {
            return { name: parts[0], gender: "unisex", theme: "custom", types: [] };
          } else {
            return { name: parts[0], gender: "unisex", theme: "custom", types: parts.slice(1) };
          }
        });
        nicknamesData = [...nicknamesData, ...newNicks];
      }

      // Reinitialize autocompletes with new data
      initAutocompletes();
      
      statusText.textContent = `Successfully imported ${parsedItems.length} items into ${target} pool!`;
      statusText.style.color = "var(--secondary-color)";
      fileInput.value = ""; // clear input
    };

    reader.onerror = function() {
      statusText.textContent = "Error reading file.";
      statusText.style.color = "red";
    };

    reader.readAsText(file);
  });

  // --- HASH GENERATION & PREVIEW LOGIC ---
  let spriteTimeout;

  function formatSymbol(str) {
    if (!str) return '';
    str = str.trim();
    if (str.length === 0) return '';
    if (!str.startsWith(':') && !str.includes('"') && !str.includes("'")) {
       let cleanStr = str.replace(/[^a-zA-Z0-9_]/g, '').toUpperCase();
       return ':' + cleanStr;
    }
    return str;
  }

  function updateSprite() {
    let speciesInput = document.getElementById('species');
    if(!speciesInput) return;
    
    let rawSpecies = speciesInput.value.trim().toLowerCase().replace(/^:/, '');
    if (!rawSpecies) return;

    if (speciesMap[rawSpecies]) {
      rawSpecies = speciesMap[rawSpecies];
    }

    if(rawSpecies.includes('nidoran') && rawSpecies.length > 8) {
        if(rawSpecies.includes('m')) rawSpecies = 'nidoranm';
        if(rawSpecies.includes('f')) rawSpecies = 'nidoranf';
    }

    const isShiny = els.shiny.checked;
    const path = isShiny ? 'gen5-shiny' : 'gen5';

    els.preview.src = `https://play.pokemonshowdown.com/sprites/${path}/${rawSpecies}.png`;

    els.preview.onerror = function() {
      this.src = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png";
    };
  }

  function updateAll() {
    els.hue_val.textContent = els.hue_change.value;
    els.preview.style.filter = `hue-rotate(${els.hue_change.value}deg)`;

    clearTimeout(spriteTimeout);
    spriteTimeout = setTimeout(updateSprite, 300);

    let lines = [];
    lines.push(`pkmn_data = {`);

    const species = formatSymbol(document.getElementById('species').value);
    if(species) lines.push(`  species: ${species},`);

    if(els.level.value) lines.push(`  level: ${els.level.value},`);

    if(els.nickname.value.trim()) lines.push(`  nickname: "${els.nickname.value.trim()}",`);

    const item = formatSymbol(document.getElementById('item').value);
    if(item) lines.push(`  item: ${item},`);

    const pokeball = formatSymbol(document.getElementById('poke_ball').value);
    if(pokeball) lines.push(`  poke_ball: ${pokeball},`);

    if(els.shiny.checked) lines.push(`  shiny: true,`);
    
    // BUG FIX: Fetch types using getElementById to avoid detached DOM node reference
    let typesInput = document.getElementById('types').value;
    if(typesInput.trim()) {
      let typeArray = typesInput.split(',')
        .map(t => formatSymbol(t))
        .filter(t => t !== '');
      if(typeArray.length > 0) {
        lines.push(`  types: [${typeArray.join(', ')}],`);
      }
    }

    if(els.hue_change.value != "0") lines.push(`  hue_change: ${els.hue_change.value},`);

    if(els.sprite_override.value.trim()) lines.push(`  sprite_override: "${els.sprite_override.value.trim()}",`);

    if(els.nature.value) lines.push(`  nature: ${els.nature.value},`);

    if(els.ivs_type.value === 'custom') {
      lines.push(`  ivs: { hp: ${els.iv_hp.value}, attack: ${els.iv_atk.value}, def: ${els.iv_def.value}, spa: ${els.iv_spa.value}, spd: ${els.iv_spd.value}, spe: ${els.iv_spe.value} },`);
    } else if (els.ivs_type.value) {
      lines.push(`  ivs: ${els.ivs_type.value},`);
    }

    let moves = [
      document.getElementById('move1').value, 
      document.getElementById('move2').value, 
      document.getElementById('move3').value, 
      document.getElementById('move4').value
    ].map(formatSymbol).filter(m => m !== '');

    if(moves.length > 0) {
      lines.push(`  moves: [${moves.join(', ')}],`);
    }

    if(lines.length > 1) {
      lines[lines.length - 1] = lines[lines.length - 1].replace(/,$/, '');
    }

    lines.push(`}`);
    lines.push(`pkmn = PokemonFactory.create(pkmn_data)`);
    lines.push(`pbAddPokemonWithNickname(pkmn)`);

    els.output.value = lines.join('\n');
  }

  updateAll();
  updateSprite();
</script>
